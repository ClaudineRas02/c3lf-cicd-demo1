name: CI — Tests automatiques

on:
  push: # se déclenche à chaque push
  pull_request: # se déclenche à chaque Pull Request

# ─── VARIABLES : config visible, non-sensible ──────────
env:
  NODE_VERSION: "20"

jobs:
  tester: # ← JOB
    runs-on: ubuntu-latest # ← RUNNER (machine virtuelle GitHub)

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }} # ← VARIABLE

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test
